<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHAMARKETCAP | Inteligência de Mercado</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --surface: #151921; --accent: #00f2ff; --up: #00ff88; --down: #ff3366; --border: #2b2f3a; --text: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- TELA DE ENTRADA (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease, visibility 1s;
        }
        .splash-logo {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            animation: fadeInUp 0.8s forwards;
            margin-bottom: 10px;
        }
        .splash-logo span { color: var(--accent); }
        .splash-slogan {
            font-size: clamp(12px, 2vw, 20px);
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 1.5s 0.8s forwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* --- LAYOUT DO SITE (APÓS ENTRADA) --- */
        #site-content { opacity: 0; transition: opacity 1.5s ease; visibility: hidden; }

        /* BARRA DE COTAÇÕES TOPO */
        .ticker-tape { background: #fff; height: 40px; border-bottom: 1px solid #ddd; overflow: hidden; }

        header { background: #000; height: 70px; display: flex; align-items: center; padding: 0 5%; border-bottom: 3px solid var(--accent); }
        .header-logo { font-weight: 800; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .header-logo span { color: var(--accent); }

        /* DASHBOARD CENTRAL */
        .main-portal { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        
        .market-main-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 30px; }
        .market-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        
        .price-display { font-size: 38px; font-family: 'JetBrains Mono'; font-weight: 700; margin: 10px 0; }
        
        .indicator-row { display: flex; gap: 20px; margin-bottom: 30px; }
        .ind-pill { background: #000; border: 1px solid var(--border); padding: 12px 20px; border-radius: 4px; font-size: 11px; }
        .ind-pill span { display: block; color: var(--accent); font-weight: 800; font-size: 15px; margin-top: 4px; }

        /* COLUNA LATERAL (PERFORMANCE) */
        .side-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 25px; }
        .side-title { font-size: 12px; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        
        .asset-row { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .asset-row strong { color: var(--accent); font-family: 'JetBrains Mono'; }

        /* GRID DE TODAS AS EMPRESAS */
        .full-grid-section { max-width: 1400px; margin: 60px auto; padding: 0 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .stock-card { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 4px; transition: 0.3s; }
        .stock-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        @media (max-width: 900px) { .main-portal { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">ALPHA<span>MARKETCAP</span></div>
    <div class="splash-slogan">Inteligência para quem move mercados.</div>
</div>

<div id="site-content">
    <div class="ticker-tape">
        <div class="tradingview-widget-container">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            { "symbols": [{"proName":"BMFBOVESPA:IBOV","title":"IBOVESPA"},{"proName":"FX_IDC:USDBRL","title":"DÓLAR"},{"proName":"BMFBOVESPA:PETR4","title":"PETR4"}], "colorTheme":"light","locale":"br"}
            </script>
        </div>
    </div>

    <header>
        <div class="header-logo">ALPHA<span>MARKETCAP</span></div>
        <div id="clock" style="margin-left: auto; font-family:'JetBrains Mono'; color:var(--accent); font-size:14px">00:00:00</div>
    </header>

    <div class="main-portal">
        <div class="market-main-card">
            <div class="market-header">
                <div>
                    <h2 style="font-weight:300; font-size:18px; color:var(--accent)">ÍNDICE BOVESPA</h2>
                    <div class="price-display">183.325,86</div>
                    <div style="color:var(--down); font-weight:700">-0,07% <small style="color:#848e9c; font-weight:400; margin-left:10px">HOJE</small></div>
                </div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Flag_of_Brazil.svg" width="35">
            </div>

            <div class="indicator-row">
                <div class="ind-pill">TAXA DI <span>14,90%</span></div>
                <div class="ind-pill">DÓLAR <span>R$ 5,12</span></div>
                <div class="ind-pill">BITCOIN <span>$ 68.432</span></div>
            </div>

            <div id="tv-main-chart" style="height: 400px; border-radius: 4px; overflow: hidden;"></div>
        </div>

        <div class="side-card">
            <div class="side-title">Mais Negociados (B3)</div>
            <div id="side-assets-list">
                </div>
        </div>
    </div>

    <div class="full-grid-section">
        <h2 style="margin-bottom:30px; font-weight:300; border-left:4px solid var(--accent); padding-left:15px">MONITORAMENTO COMPLETO</h2>
        <div class="grid-container" id="full-grid"></div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';

    // 1. GERENCIAR ENTRADA
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            document.getElementById('splash-screen').style.visibility = 'hidden';
            const content = document.getElementById('site-content');
            content.style.visibility = 'visible';
            content.style.opacity = '1';
        }, 3000);
    });

    // 2. INICIALIZAR GRÁFICO B3
    new TradingView.widget({
        "container_id": "tv-main-chart",
        "symbol": "BMFBOVESPA:IBOV",
        "interval": "D", "theme": "dark", "style": "3", "locale": "br", "width": "100%", "height": "100%", "hide_top_toolbar": true
    });

    // 3. CARREGAR DADOS DA PLANILHA
    async function loadAlphaEngine() {
        try {
            const r = await fetch(SHEET_URL);
            const t = await r.text();
            const rows = t.split('\n').slice(1);
            const stocks = rows.map(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { ticker: c[0].replace(/"/g,''), name: c[1].replace(/"/g,''), price: c[2], pct: c[3] };
            }).filter(x => x.ticker);

            // Tabela Lateral
            const side = document.getElementById('side-assets-list');
            stocks.slice(0, 8).forEach(x => {
                side.innerHTML += `<div class="asset-row"><strong>${x.ticker}</strong> <span style="color:${x.pct.includes('-')?'var(--down)':'var(--up)'}">${x.pct}</span></div>`;
            });

            // Grid Principal
            const grid = document.getElementById('full-grid');
            stocks.forEach(x => {
                grid.innerHTML += `
                    <div class="stock-card">
                        <div style="font-size:12px; color:var(--accent); font-weight:800; margin-bottom:10px">${x.ticker}</div>
                        <div style="font-size:24px; font-weight:700; font-family:'JetBrains Mono'">${x.price}</div>
                        <div style="color:${x.pct.includes('-')?'var(--down)':'var(--up)'}; font-weight:800; font-size:14px; margin-top:5px">${x.pct}</div>
                        <div style="color:#848e9c; font-size:11px; margin-top:10px">${x.name}</div>
                    </div>`;
            });
        } catch(e) { console.error("Erro na carga de dados"); }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    loadAlphaEngine();
</script>
</body>
</html>
