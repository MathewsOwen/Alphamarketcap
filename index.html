<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AlphaMarketCap | Global Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=301">
</head>
<body class="gold-edition">

    <div class="top-bar">
        <div class="ticker-track" id="globalTicker"></div>
    </div>

    <header class="header">
        <div class="container header-flex">
            <div class="brand">
                <span class="logo-gold">ALPHA</span><span class="logo-white">MARKETCAP</span>
            </div>
            <nav class="nav">
                <button class="nav-link active" onclick="switchTab('market')">MERCADOS</button>
                <button class="nav-link" onclick="switchTab('news')">NOTÍCIAS VIVAS</button>
            </nav>
        </div>
    </header>

    <main class="container main-grid">
        <section class="chart-section" id="marketView">
            <div class="card chart-card">
                <div id="tradingview_alpha"></div>
            </div>
        </section>

        <aside class="ranking-section" id="rankingView">
            <div class="card">
                <h3 class="gold-title">TOP 10 ALTAS (B3)</h3>
                <div id="highList" class="asset-list"></div>
                
                <h3 class="gold-title mt-20">TOP 10 BAIXAS (B3)</h3>
                <div id="lowList" class="asset-list"></div>
            </div>
        </aside>

        <section class="news-section hidden" id="newsView">
            <div class="card">
                <div class="news-header">
                    <h2 class="gold-title">WORLD NEWS FEED // 1min Update</h2>
                    <span class="live-tag">LIVE</span>
                </div>
                <div id="newsFeed" class="news-grid">
                    </div>
            </div>
        </section>
    </main>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="js/app.js?v=301"></script>
</body>
</html>
