<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaMarketCap | Inteligência Financeira</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=200">
</head>
<body class="light-theme">

    <div class="market-ticker">
        <div class="ticker-track" id="bankTicker"></div>
    </div>

    <header class="navbar">
        <div class="container">
            <div class="brand">
                <span class="logo">ALPHA</span><span class="logo-bold">MARKETCAP</span>
            </div>
            <nav class="main-nav">
                <a href="#" class="active">Mercados</a>
                <a href="#">Notícias</a>
                <a href="#">Análise Quant</a>
                <a href="#">Carteiras</a>
            </nav>
            <div class="user-actions">
                <button class="btn-login">Acessar Terminal</button>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <div class="container grid-main">
            <section class="main-chart-card">
                <div class="card-header">
                    <div class="asset-info">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/B3_Logo.png" alt="B3" class="asset-logo">
                        <div>
                            <h1>Ibovespa</h1>
                            <span class="symbol">IBOV // Índice Bovespa</span>
                        </div>
                    </div>
                    <div class="asset-price">
                        <span class="current-price" id="mainPrice">128.450</span>
                        <span class="change positive">+1.24%</span>
                    </div>
                </div>
                <div id="tradingview_alpha" class="chart-container"></div>
            </section>

            <aside class="market-sidebar">
                <div class="sidebar-card">
                    <h3>Mais lidas do mercado</h3>
                    <div id="moversList" class="movers-minimal"></div>
                </div>
            </aside>
        </div>
    </main>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="js/app.js?v=200"></script>
</body>
</html>
