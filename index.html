<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AlphaMarketCap | Private Banking Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=400">
</head>
<body class="private-edition">

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

    <div class="top-bar">
        <div class="ticker-track" id="globalTicker"></div>
    </div>

    <header class="header">
        <div class="container header-flex">
            <div class="brand">
                <span class="logo-gold">ALPHA</span><span class="logo-white">MARKETCAP</span>
            </div>
            <nav class="nav">
                <button class="nav-link active" onclick="switchTab('market')">TERMINAL</button>
                <button class="nav-link" onclick="switchTab('news')">FEED DE NOTÍCIAS</button>
            </nav>
        </div>
    </header>

    <main class="container main-grid">
        <section class="chart-section" id="marketView">
            <div class="card chart-card">
                <div id="tradingview_alpha"></div>
            </div>
        </section>

        <aside class="ranking-section" id="rankingView">
            <div class="card ranking-card">
                <div class="tabs-ranking">
                    <button id="btn-high" class="tab-btn active" onclick="toggleRanking('high')">ALTAS</button>
                    <button id="btn-low" class="tab-btn" onclick="toggleRanking('low')">BAIXAS</button>
                </div>
                
                <div id="highList" class="asset-list"></div>
                <div id="lowList" class="asset-list hidden"></div>
            </div>
        </aside>

        <section class="news-section hidden" id="newsView">
            <div class="card">
                <div class="news-header">
                    <h2 class="gold-title">GLOBAL INTELLIGENCE FEED</h2>
                    <div class="live-indicator">
                        <span class="pulse-red"></span> LIVE UPDATING
                    </div>
                </div>
                <div id="newsFeed" class="news-grid"></div>
            </div>
        </section>
    </main>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="js/app.js?v=400"></script>
</body>
</html>
