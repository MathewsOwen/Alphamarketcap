<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ALPHAMARKETCAP | Intelligence Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000; --card: #0d1117; --accent: #00f2ff;
            --up: #00ff88; --down: #ff3366; --text: #f0f3f5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        header { background: #000; padding: 15px 30px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .ticker-wrap { background: #000; border-bottom: 1px solid #222; padding: 8px 0; overflow: hidden; }
        .ticker { display: inline-block; white-space: nowrap; animation: scroll 60s linear infinite; font-family: 'JetBrains Mono'; font-size: 11px; color: var(--up); }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        .container { display: flex; height: calc(100vh - 100px); }
        aside { width: 200px; padding: 20px; border-right: 1px solid #222; }
        .nav-item { padding: 12px; color: #848e9c; cursor: pointer; font-size: 11px; font-weight: 700; border-radius: 4px; margin-bottom: 4px; text-transform: uppercase; }
        .nav-item.active { background: #1e2329; color: var(--accent); }

        main { flex: 1; padding: 30px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--card); border-radius: 12px; padding: 20px; 
            border: 1px solid #222; transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--accent); background: #161b22; transform: translateY(-2px); }

        .symbol { color: var(--accent); font-size: 12px; font-weight: 700; margin-bottom: 8px; display: block; }
        .price { font-size: 26px; font-weight: 700; margin-bottom: 10px; font-family: 'JetBrains Mono'; }
        .change { font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 4px; }
        .pos { color: var(--up); background: rgba(0, 255, 136, 0.1); }
        .neg { color: var(--down); background: rgba(255, 51, 102, 0.1); }

        /* TOOLTIP DO ÍNDICE */
        #company-info {
            position: fixed; display: none; width: 280px; background: rgba(13, 17, 23, 0.98);
            border: 1px solid var(--accent); border-radius: 8px; padding: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); z-index: 9999;
            backdrop-filter: blur(10px); pointer-events: none;
        }
        .info-title { color: var(--accent); font-weight: 800; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; }
        .info-desc { font-size: 12px; color: #f0f3f5; line-height: 1.5; font-weight: 400; }
    </style>
</head>
<body>

<header>
    <div class="logo">ALPHA<span>MARKETCAP</span></div>
    <div id="real-clock" style="font-family: 'JetBrains Mono'; font-size: 12px; color: #848e9c"></div>
</header>

<div class="ticker-wrap"><div class="ticker" id="ticker-feed">CARREGANDO DADOS ALPHA...</div></div>

<div class="container">
    <aside id="side-menu"></aside>
    <main>
        <div class="grid" id="main-grid"></div>
        <div id="company-info">
            <div class="info-title" id="tt-name"></div>
            <div class="info-desc" id="tt-desc"></div>
        </div>
    </main>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR9hPdpNw-jrALbP32-Pgqhwe_X98uaZht0tjtZXidCFwiXvXTjbJc5diOaI270W8m_hyHYpd5xwlQl/pub?gid=0&single=true&output=csv';
    
    function sanitize(val) { return val ? val.toString().replace(/["']/g, "").trim() : ""; }

    async function fetchData() {
        try {
            const r = await fetch(SHEET_URL);
            const text = await r.text();
            const rows = text.split(/\r?\n/).slice(1);
            
            window.stocks = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    ticker: sanitize(cols[0]),
                    name: sanitize(cols[1]),
                    price: sanitize(cols[2]),
                    pct: sanitize(cols[3]),
                    sector: sanitize(cols[4]),
                    desc: sanitize(cols[5]) // Lendo Coluna F
                };
            }).filter(s => s.ticker && s.ticker !== "");

            renderGrid(document.querySelector('.nav-item.active')?.innerText || "TECNOLOGIA");
            updateTicker();
        } catch (e) { console.error("Erro Alpha."); }
    }

    function updateTicker() {
        const feed = window.stocks.map(s => `${s.ticker}: R$ ${s.price} (${s.pct})`).join('  •  ');
        document.getElementById('ticker-feed').innerText = `+++ ALPHA INTELLIGENCE FEED: ${feed} +++`;
    }

    function renderGrid(sector) {
        const container = document.getElementById('main-grid');
        container.innerHTML = '';
        const filtered = window.stocks.filter(s => s.sector.toUpperCase() === sector.toUpperCase());

        filtered.forEach(s => {
            const isPos = !s.pct.includes('-');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="symbol">${s.ticker}</span>
                <div class="price">R$ ${s.price}</div>
                <span class="change ${isPos ? 'pos' : 'neg'}">${s.pct}</span>
            `;

            card.onmousemove = (e) => {
                const tt = document.getElementById('company-info');
                document.getElementById('tt-name').innerText = s.name;
                document.getElementById('tt-desc').innerText = s.desc || "Descrição pendente no sistema...";
                tt.style.display = 'block';
                tt.style.left = (e.clientX + 15) + 'px';
                tt.style.top = (e.clientY + 15) + 'px';
            };
            
            card.onmouseleave = () => { document.getElementById('company-info').style.display = 'none'; };
            container.appendChild(card);
        });
    }

    const sectors = ["Tecnologia", "Defesa", "Energia", "Cibersegurança", "Bancos", "Commodities", "Logística", "Saúde", "Varejo", "Refúgio"];
    const menu = document.getElementById('side-menu');
    sectors.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = `nav-item ${i === 0 ? 'active' : ''}`;
        div.innerText = s.toUpperCase();
        div.onclick = function() {
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
            renderGrid(s);
        };
        menu.appendChild(div);
    });

    fetchData();
    setInterval(fetchData, 30000);
    setInterval(() => { document.getElementById('real-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
